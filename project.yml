name: DaystingIRC
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.10
    MACOSX_DEPLOYMENT_TARGET: 13.0
    PRODUCT_BUNDLE_IDENTIFIER: com.daysting.ircclient
    MARKETING_VERSION: 1.3
    CURRENT_PROJECT_VERSION: 1.3
    DEVELOPMENT_TEAM: ""
targets:
  DaystingIRC:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources
      - path: Resources/AppIcon.icns
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: DaystingIRC
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: DaystingIRC
        INFOPLIST_KEY_CFBundleIconFile: AppIcon.icns
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Erick Hofer. All rights reserved."
schemes:
  DaystingIRC:
    build:
      targets:
        DaystingIRC: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
